name: Publish

# Push a version tag (e.g. v0.1.1) → test, then publish to npm via Trusted
# Publishing (OIDC) with build provenance — no token or secret is stored.
# One-time setup: on npmjs.com, package qbrin → Settings → Trusted Publisher →
# add GitHub Actions (org: qbrin-stack, repo: qbrin-js, workflow: publish.yml).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test test/client.test.js

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — npm Trusted Publishing + provenance (no token)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest
      - name: Tag must match the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG does not match package.json version $VER"; exit 1; }
      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
